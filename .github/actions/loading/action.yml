name: Load Parameters
description: Load parameters for the build job

outputs:
  build_matrix:
    description: Build matrix
    value: ${{ steps.matrix.outputs.build_matrix }}

runs:
  using: "composite"
  steps:
    - name: Set the Build Matrix
      id: matrix
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          const workspace = process.env.GITHUB_WORKSPACE;

          function findFile(startDir, fileName) {
            const entries = fs.readdirSync(startDir, { withFileTypes: true });

            for (const entry of entries) {
              const fullPath = path.join(startDir, entry.name);

              if (entry.isFile() && entry.name === fileName) {
                return fullPath;
              }

              if (entry.isDirectory()) {
                const found = findFile(fullPath, fileName);
                if (found) return found;
              }
            }

            return null;
          }

          const preferredPath = path.join(workspace, 'ci', 'build_matrix.json');

          let configPath = null;

          if (fs.existsSync(preferredPath)) {
            configPath = preferredPath;
          } else {
            configPath = findFile(workspace, 'build_matrix.json');
          }

          if (!configPath) {
            core.setFailed(`build_matrix.json not found. Looked first in: ${preferredPath}, then recursively under: ${workspace}`);
            return;
          }

          let config;
          try {
            config = JSON.parse(fs.readFileSync(configPath, 'utf-8'));
          } catch (err) {
            core.setFailed(`Failed to parse build_matrix.json at ${configPath}: ${err.message}`);
            return;
          }

          // Validate matrix structure
          if (!config || !Array.isArray(config.include)) {
            core.setFailed('build_matrix.json must contain an "include" array for GHA strategy expansion.');
            return;
          }

          const buildMatrixStr = JSON.stringify(config);

          // Set output and log
          core.setOutput('build_matrix', buildMatrixStr);
          console.log(`Build Matrix loaded successfully from: ${configPath}`);
          console.log(JSON.stringify(config, null, 2));

          // Build Summary
          const md = [
            '## Build Matrix Initialized',
            `Loaded from: \`${configPath}\``,
            '',
            'The following targets were identified in `build_matrix.json`:',
            '```json',
            JSON.stringify(config, null, 2),
            '```'
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
